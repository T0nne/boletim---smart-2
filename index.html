<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Meu Boletim - Acompanhe suas notas com IA">
    <meta name="theme-color" content="#7c6bff">
    
    <title>Meu Boletim - Seus Estudos Organizados</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- CSS - Separado em módulos -->
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <!-- CSP Header (Security) -->
    <meta http-equiv="Content-Security-Policy" 
          content="default-src 'self'; script-src 'self'; style-src 'self' fonts.googleapis.com; font-src fonts.gstatic.com; connect-src 'self' https://api.example.com;">
</head>
<body>
    <!-- Main App Container -->
    <div id="app" class="app">
        <!-- Header -->
        <header class="header" id="header"></header>
        
        <!-- Navigation Tabs -->
        <nav class="tabs" id="tabs" role="tablist"></nav>
        
        <!-- Pages Container -->
        <main class="pages-container" id="pages"></main>
        
        <!-- Toast Notifications -->
        <div class="toast" id="toast" role="alert" aria-live="polite"></div>
        
        <!-- Modals Container -->
        <div id="modals"></div>
    </div>
    
    <!-- Loading Screen -->
    <div class="loading-screen" id="loading-screen">
        <div class="loader"></div>
        <p>Carregando Meu Boletim...</p>
    </div>

    <!-- Scripts - Ordem importa -->
    <!-- 1. Utils & Constants -->
    <script type="module" src="js/constants.js"></script>
    <script type="module" src="js/utils.js"></script>
    
    <!-- 2. State Management -->
    <script type="module" src="js/state.js"></script>
    
    <!-- 3. Storage & Persistence -->
    <script type="module" src="js/storage.js"></script>
    
    <!-- 4. API & Backend -->
    <script type="module" src="js/api.js"></script>
    
    <!-- 5. UI Components -->
    <script type="module" src="js/ui.js"></script>
    
    <!-- 6. Feature Modules -->
    <script type="module" src="js/dashboard.js"></script>
    <script type="module" src="js/subjects.js"></script>
    <script type="module" src="js/agenda.js"></script>
    <script type="module" src="js/chat.js"></script>
    <script type="module" src="js/config.js"></script>
    
    <!-- 7. App Bootstrap -->
    <script type="module" src="js/app.js"></script>
    
    <!-- External Libraries (chart.js for data visualization) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
</body>
</html>
